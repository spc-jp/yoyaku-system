<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はじめまして税理士みっけ｜みらい先生</title>
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --paper:#F7F4EE;
    --ink:#2E3A34;
    --ink-soft:#5B6A62;
    --sage:#6B8E7F;
    --sage-deep:#4A6B5C;
    --sage-tint:#EAF1EC;
    --honey:#E0A756;
    --honey-deep:#C88C3C;
    --line:#E3DDD1;
    --white:#FFFFFF;
    --shadow:0 8px 30px rgba(46,58,52,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.85;
    -webkit-font-smoothing:antialiased;
    padding:0 0 40px;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}

  /* ヘッダー（先生の顔＋名前） */
  header{
    text-align:center;
    padding:34px 16px 22px;
  }
  .avatar{
    width:96px;height:96px;border-radius:50%;
    margin:0 auto 14px;
    background:var(--sage-tint);
    border:3px solid var(--white);
    box-shadow:var(--shadow);
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  /* ↓ 実際の先生の写真に差し替えるときは、この<svg>を <img src="sensei.jpg" ...> に置き換えてください */
  .avatar svg{width:100%;height:100%}
  .sensei-name{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:15px;color:var(--sage-deep);letter-spacing:.08em;
  }
  .sensei-name b{font-size:21px;display:block;color:var(--ink);margin-top:2px;letter-spacing:.04em}
  .office{font-size:12px;color:var(--ink-soft);margin-top:6px;letter-spacing:.05em}

  /* 会話エリア */
  .chat{margin-top:8px}
  .row{display:flex;gap:10px;margin-bottom:18px;align-items:flex-start;
       opacity:0;transform:translateY(8px);animation:pop .5s ease forwards}
  @keyframes pop{to{opacity:1;transform:none}}
  .mini{
    flex:0 0 40px;width:40px;height:40px;border-radius:50%;
    background:var(--sage-tint);border:2px solid var(--white);overflow:hidden;
    box-shadow:0 2px 8px rgba(46,58,52,.08);
  }
  .mini svg{width:100%;height:100%}
  .bubble{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:4px 18px 18px 18px;
    padding:16px 18px;
    box-shadow:var(--shadow);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:15.5px;color:var(--ink);
    white-space:pre-wrap;
  }
  .bubble .tag{
    display:inline-block;font-family:"Hiragino Sans",sans-serif;
    font-size:11px;color:var(--sage-deep);background:var(--sage-tint);
    padding:2px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:.05em;
  }

  /* 選択ボタン */
  .choices{margin:6px 0 4px}
  .group-label{
    font-size:12px;color:var(--ink-soft);letter-spacing:.08em;
    margin:20px 0 10px;padding-left:4px;display:flex;align-items:center;gap:8px;
  }
  .group-label::before{content:"";width:14px;height:2px;background:var(--sage);border-radius:2px}
  .btn{
    display:block;width:100%;text-align:left;
    background:var(--white);border:1px solid var(--line);
    border-radius:14px;padding:15px 18px;margin-bottom:10px;
    font-size:15px;color:var(--ink);cursor:pointer;
    transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease;
    font-family:inherit;line-height:1.6;
  }
  .btn:hover{transform:translateY(-1px);border-color:var(--sage);box-shadow:var(--shadow)}
  .btn:focus-visible{outline:2px solid var(--sage);outline-offset:2px}
  .btn .arrow{float:right;color:var(--sage);opacity:.7}
  .btn.mamori{border-left:4px solid #A7BEC7}
  .btn.seme{border-left:4px solid var(--honey)}
  .btn.soft{border:1px dashed var(--line);background:#FBFAF6;color:var(--ink-soft);border-left:4px solid #CBBBA0}
  .btn.soft:hover{border-color:var(--sage);color:var(--ink)}
  .soft-lead{font-size:12px;color:#A7A093;letter-spacing:.06em;margin:24px 0 10px;padding-top:18px;
             border-top:1px solid var(--line);text-align:center}

  /* CTA */
  .cta-wrap{
    text-align:center;margin-top:14px;
    opacity:0;transform:translateY(8px);animation:pop .5s ease forwards
  }
  .cta{
    display:inline-block;background:var(--honey);color:#fff;
    font-size:16px;font-weight:700;text-decoration:none;
    padding:15px 34px;border-radius:30px;
    box-shadow:0 8px 22px rgba(224,167,86,.35);
    transition:transform .12s ease,background .12s ease;letter-spacing:.03em;
  }
  .cta:hover{transform:translateY(-2px);background:var(--honey-deep)}
  .cta-note{font-size:12.5px;color:var(--ink-soft);margin-top:10px}

  /* 戻る */
  .back{
    display:block;margin:22px auto 0;background:none;border:none;
    color:var(--ink-soft);font-size:13px;cursor:pointer;
    text-decoration:underline;text-underline-offset:3px;font-family:inherit;
  }
  .back:hover{color:var(--sage-deep)}

  footer{text-align:center;font-size:11px;color:#A7A093;margin-top:34px;letter-spacing:.04em}

  /* タイピング表示 */
  .typing .bubble{color:var(--ink-soft)}
  .dots span{
    display:inline-block;width:6px;height:6px;margin:0 2px;border-radius:50%;
    background:var(--sage);opacity:.4;animation:blink 1.2s infinite
  }
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.35}30%{opacity:1}}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="avatar" id="mainAvatar"></div>
    <div class="sensei-name">税理士<b>みらい先生</b></div>
    <div class="office">みらい税理士事務所（デモ）</div>
  </header>

  <div class="chat" id="chat"></div>

  <footer>Powered by Smile Plus Consulting ／ 顔の見えるAI・デモ版</footer>
</div>

<script>
/* ===== 先生キャラのSVG（写真に差し替え可） ===== */
var FACE_SVG = '<img src="avatar.jpg" style="width:100%;height:100%;object-fit:cover;display:block" alt="みらい先生">';

document.getElementById('mainAvatar').innerHTML = FACE_SVG;

/* ===== 会話データ ===== */
var GREETING =
  "はじめまして😊 税理士のみらいです。\n\n"+
  "税金や経営のこと、「こんなこと聞いていいのかな」と思うようなことでも大丈夫ですよ。\n\n"+
  "まずは、いまいちばん気になっていることから、ゆっくり聞かせてください。";

var TOPICS = [
  { group:"mamori", label:"開業したばかりで、申告が不安です",
    reply:"開業されたばかりなのですね😊 まずは、その一歩を踏み出されたこと、本当におめでとうございます。\n\n最初のうちは「何を、いつまでに、どうすれば」がわからなくて当然です。私が最初にお伝えしているのは、"+
          "「完璧にやろうとしなくて大丈夫」ということ。\n\nもしよかったら、いまのお気持ちにいちばん近いのは、どれですか?",
    followups:[
      { label:"何から手をつけていいかわからない",
        reply:"大丈夫ですよ😊 最初の一歩は「まずこれだけやればいい」を一緒に決めるところから。順番さえ見えれば、ぐっと楽になります。" },
      { label:"帳簿つけが続くか不安です",
        reply:"続けられるか不安、よくわかります😊 実は「続く」のは、がんばりではなく「仕組み」で作れるんです。あなたに合ったやり方を一緒に見つけましょう。" },
      { label:"税理士に頼む費用が心配です",
        reply:"費用のこと、正直に気にしてくださってうれしいです😊 無理のない範囲から始められるよう、まずはご状況を聞かせてくださいね。" }
    ] },

  { group:"mamori", label:"法人化のタイミングを知りたいです",
    reply:"法人化、気になりますよね😊 とても良いタイミングでのご相談だと思います。\n\n実は「利益がいくらになったら」という数字の話より先に、私は"+
          "「これから会社をどう育てていきたいか」をお聞きするようにしています。\n\nいまのお気持ちに近いのは、どれでしょう?",
    followups:[
      { label:"節税になるのか知りたい",
        reply:"節税の効果は、会社の状況で本当に変わります😊 あなたの場合はどうか、具体的な数字で一緒に見てみましょう。" },
      { label:"手続きが大変そうで踏み切れない",
        reply:"手続き、たしかに一人だと大変です😊 でもそこは私が段取りをぜんぶお手伝いします。社長は前に進むことだけ考えてくだされば大丈夫です。" },
      { label:"まだ早い気もして迷っている",
        reply:"迷うのは、それだけ真剣に考えている証拠だと思います😊 早いかどうかも含めて、一度いっしょに整理してみませんか。" }
    ] },

  { group:"mamori", label:"相続のことが気になっています",
    reply:"相続のこと、気にかけていらっしゃるのですね。とても大切なことです😊\n\n相続の相談は、数字よりも「ご家族への想い」から始まることがほとんどです。"+
          "\n\n差し支えなければ、いまいちばん気になっているのは、どれですか?",
    followups:[
      { label:"何から準備すればいいかわからない",
        reply:"焦らなくて大丈夫です😊 まずは今の状況を、ひとつずつ一緒に整理するところから始めましょう。" },
      { label:"家族でもめないか心配です",
        reply:"ご家族への想いがあるからこその心配ですね😊 円満に遺すための準備、一緒に丁寧に考えていきましょう。" },
      { label:"税金がどれくらいか不安です",
        reply:"税金の不安は、先に見通しが立つとぐっと軽くなります😊 まずはおおよそのところを、一緒に確かめてみましょう。" }
    ] },

  { group:"seme", label:"経営計画を立てたいです",
    reply:"経営計画ですね😊 とても前向きな一歩だと思います。\n\n計画というと、いきなり数字や表を思い浮かべる方が多いのですが、私はいつも、"+
          "数字よりも先に社長の想いからお聞きするようにしています。\n\nもしよかったら、いまのお気持ちに近いのは、どれですか?",
    followups:[
      { label:"何から手をつけていいかわからない",
        reply:"大丈夫です😊 計画は「想い」を言葉にするところから。順番は私が一緒に組み立てますから、まっさらな状態で来てくださいね。" },
      { label:"数字が苦手で後回しにしてしまう",
        reply:"数字が苦手でも、まったく問題ありません😊 想いさえ聞かせてもらえれば、数字は私が形にします。得意なところで役に立たせてください。" },
      { label:"やりたいことを言葉にできない",
        reply:"やりたいことがある、それがいちばんの宝物です😊 その言葉にならない想いを、一緒に言葉にしていくのが私の仕事です。" }
    ] },

  { group:"seme", label:"銀行融資に向けて数字を整えたいです",
    reply:"融資に向けての準備ですね😊 会社を前に進めようとされている、その姿勢が素晴らしいです。\n\n銀行に伝わる数字というのは、"+
          "実は「社長がどこへ向かっているか」がちゃんと見える数字のことなんです。\n\nいまのお気持ちに近いのは、どれでしょう?",
    followups:[
      { label:"何を準備すればいいかわからない",
        reply:"必要な準備は、状況によって変わります😊 あなたに必要なものだけを、一緒にそろえていきましょう。" },
      { label:"断られないか不安です",
        reply:"不安ですよね😊 でも、伝わる計画をきちんと作れば、通る可能性はぐっと上がります。そこを一緒に仕上げましょう。" },
      { label:"数字づくりに自信がない",
        reply:"数字づくりは、私のいちばん得意なところです😊 社長は未来を語ってくだされば、それを数字に翻訳するのは任せてください。" }
    ] },

  { group:"seme", label:"補助金を使って設備投資を考えています",
    reply:"補助金を活かした設備投資、いいですね😊 会社の未来への大事な投資だと思います。\n\n補助金は種類も条件もさまざまですが、大切なのは"+
          "「その設備で、会社をどう良くしたいか」という想いの部分です。\n\nいまいちばん気になっているのは、どれですか?",
    followups:[
      { label:"どの補助金が合うかわからない",
        reply:"補助金は種類が多いですよね😊 やりたい設備投資のお話を伺えば、合うものを一緒に見つけられます。" },
      { label:"書類づくりが大変そう",
        reply:"書類、正直に言うと大変です😊 でもそこは私や専門のパートナーが伴走します。社長を一人にはしませんから、安心してくださいね。" },
      { label:"採択されるか不安です",
        reply:"採択の不安、わかります😊 想いの伝わる申請にすれば、可能性は高まります。一緒に、通る形に整えていきましょう。" }
    ] },

  { group:"soft", label:"まだ、うまく言葉にできないんです",
    reply:"大丈夫ですよ😊 むしろ、その状態でここに来てくださったことが、とても大事な一歩なんです。\n\n"+
          "はっきりした悩みがなくても、なんとなく気になっていること、ちょっとした不安。そういうものの中に、実は大切なヒントが隠れていることが多いんです。\n\n"+
          "よかったら、いまのお気持ちに近いのは、どれですか?",
    followups:[
      { label:"お金のことが、漠然と不安です",
        reply:"その漠然とした不安、とてもよくわかります😊 何が不安なのかを一緒に言葉にするだけで、ずいぶん気持ちが軽くなるものですよ。" },
      { label:"今のやり方でいいのか、たまに迷う",
        reply:"迷いながらも続けてこられた、それ自体がすごいことです😊 一度立ち止まって、いまのやり方を一緒に見直してみませんか。" },
      { label:"特に困ってないけど、話を聞いてみたい",
        reply:"それが、いちばん健やかな来かたかもしれません😊 困ってからではなく、余裕のあるうちに話しておくと、いざというとき安心なんですよ。" }
    ] }
];

/* ===== 描画ロジック ===== */
var chat = document.getElementById('chat');

function scrollToEnd(){ window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); }

function senseiBubble(text, tag){
  var row = document.createElement('div');
  row.className = 'row';
  var tagHtml = tag ? '<span class="tag">'+tag+'</span>' : '';
  row.innerHTML =
    '<div class="mini">'+FACE_SVG+'</div>'+
    '<div class="bubble">'+tagHtml+text+'</div>';
  chat.appendChild(row);
  scrollToEnd();
  return row;
}

function typingBubble(){
  var row = document.createElement('div');
  row.className = 'row typing';
  row.innerHTML =
    '<div class="mini">'+FACE_SVG+'</div>'+
    '<div class="bubble"><span class="dots"><span></span><span></span><span></span></span></div>';
  chat.appendChild(row);
  scrollToEnd();
  return row;
}

function showChoices(){
  var box = document.createElement('div');
  box.className = 'choices row';
  box.style.animationDelay = '.1s';
  box.style.display = 'block';

  var mamori = TOPICS.filter(function(t){return t.group==='mamori';});
  var seme   = TOPICS.filter(function(t){return t.group==='seme';});

  var html = '<div style="width:100%">';
  html += '<div class="group-label">いま気になっていること</div>';
  mamori.forEach(function(t){
    var i = TOPICS.indexOf(t);
    html += '<button class="btn mamori" data-i="'+i+'">'+t.label+'<span class="arrow">›</span></button>';
  });
  html += '<div class="group-label">これから、を考えたいとき</div>';
  seme.forEach(function(t){
    var i = TOPICS.indexOf(t);
    html += '<button class="btn seme" data-i="'+i+'">'+t.label+'<span class="arrow">›</span></button>';
  });

  var soft = TOPICS.filter(function(t){return t.group==='soft';});
  soft.forEach(function(t){
    var i = TOPICS.indexOf(t);
    html += '<div class="soft-lead">どれもピンとこない方へ</div>';
    html += '<button class="btn soft" data-i="'+i+'">'+t.label+'<span class="arrow">›</span></button>';
  });
  html += '</div>';

  box.innerHTML = html;
  chat.appendChild(box);
  scrollToEnd();

  box.querySelectorAll('.btn').forEach(function(b){
    b.addEventListener('click', function(){
      var i = parseInt(b.getAttribute('data-i'),10);
      chooseTopic(i, box);
    });
  });
}

function chooseTopic(i, choicesBox){
  var t = TOPICS[i];
  choicesBox.remove();

  // 利用者が選んだ言葉を、右寄せの吹き出しふうに（簡易表示）
  var userRow = document.createElement('div');
  userRow.className = 'row';
  userRow.style.justifyContent = 'flex-end';
  userRow.innerHTML =
    '<div class="bubble" style="background:var(--sage-tint);border:none;'+
    'border-radius:18px 4px 18px 18px;font-family:inherit;font-size:14.5px;color:var(--sage-deep)">'+t.label+'</div>';
  chat.appendChild(userRow);
  scrollToEnd();

  var typing = typingBubble();
  setTimeout(function(){
    typing.remove();
    var tag = t.group==='seme' ? '前向きなご相談' : 'まずはお気持ちから';
    senseiBubble(t.reply, tag);
    setTimeout(function(){ showFollowups(t); }, 500);
  }, 950);
}

function showFollowups(t){
  var box = document.createElement('div');
  box.className = 'choices row';
  box.style.animationDelay = '.1s';
  box.style.display = 'block';

  var html = '<div style="width:100%">';
  html += '<div class="group-label">いまのお気持ちに近いのは?</div>';
  t.followups.forEach(function(f, idx){
    html += '<button class="btn '+t.group+'" data-f="'+idx+'">'+f.label+'<span class="arrow">›</span></button>';
  });
  html += '</div>';

  box.innerHTML = html;
  chat.appendChild(box);
  scrollToEnd();

  box.querySelectorAll('.btn').forEach(function(b){
    b.addEventListener('click', function(){
      var idx = parseInt(b.getAttribute('data-f'),10);
      chooseFollowup(t, idx, box);
    });
  });
}

function chooseFollowup(t, idx, choicesBox){
  var f = t.followups[idx];
  choicesBox.remove();

  var userRow = document.createElement('div');
  userRow.className = 'row';
  userRow.style.justifyContent = 'flex-end';
  userRow.innerHTML =
    '<div class="bubble" style="background:var(--sage-tint);border:none;'+
    'border-radius:18px 4px 18px 18px;font-family:inherit;font-size:14.5px;color:var(--sage-deep)">'+f.label+'</div>';
  chat.appendChild(userRow);
  scrollToEnd();

  var isSoft = (t.group === 'soft');
  var typing = typingBubble();
  setTimeout(function(){
    typing.remove();
    senseiBubble(f.reply, 'ありがとうございます');
    if(isSoft){
      // フワッと来た人には、面談へのひとことをやわらかく添える
      setTimeout(function(){
        var t2 = typingBubble();
        setTimeout(function(){
          t2.remove();
          senseiBubble("もしよかったら、一度お話だけでも聞かせてくださいね。\n\n答えを出す場ではなく、ただ気持ちを整理する時間だと思って、どうぞ気楽にいらしてください😊", "急かしません");
          setTimeout(function(){ showCTA(true); }, 500);
        }, 900);
      }, 700);
    } else {
      setTimeout(function(){ showCTA(false); }, 550);
    }
  }, 950);
}

function showCTA(isSoft){
  var note = isSoft
    ? 'まずはお気持ちだけ、聞かせてください。急かしたりはしませんよ😊'
    : 'この続きは、みらい先生と直接お話ししてみませんか😊';
  var w = document.createElement('div');
  w.className = 'cta-wrap';
  w.innerHTML =
    '<a class="cta" href="#" onclick="return false;">面談を予約する（初回無料）</a>'+
    '<div class="cta-note">'+note+'</div>'+
    '<button class="back" id="backBtn">← 別のことも相談してみる</button>';
  chat.appendChild(w);
  scrollToEnd();
  document.getElementById('backBtn').addEventListener('click', showChoices);
}

/* ===== 起動 ===== */
window.addEventListener('load', function(){
  var typing = typingBubble();
  setTimeout(function(){
    typing.remove();
    senseiBubble(GREETING);
    setTimeout(showChoices, 550);
  }, 900);
});
</script>
</body>
</html>
